name: CI

on:
  push:
    branches:
      - main
      - master
      - feat/**
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Compile source files
        run: python -m compileall src scripts

      - name: Verify import and config fallback
        run: |
          mkdir -p .ci-empty/gamedata .ci-empty/storyjson
          export GAMEDATA_PATH="$PWD/.ci-empty/gamedata"
          export STORYJSON_PATH="$PWD/.ci-empty/storyjson"
          python - <<'PY'
          from pathlib import Path
          from prts_mcp.config import Config
          from prts_mcp.data.operator import get_operator_archives

          cfg = Config.load()
          assert cfg.gamedata_path is not None
          assert cfg.gamedata_path.resolve() == Path(".ci-empty/gamedata").resolve()
          assert cfg.has_operator_data is False
          message = get_operator_archives("阿米娅")
          assert "本地干员数据不可用" in message
          print("Import/config verification passed.")
          PY

  build-image:
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Restore cached gamedata
        uses: actions/cache@v4
        with:
          path: data/gamedata
          key: gamedata-${{ hashFiles('data/gamedata/cache_meta.json') }}
          restore-keys: gamedata-

      - name: Fetch latest gamedata from GitHub
        run: python scripts/fetch_gamedata.py
        # Exits 0 on success or when cached data covers a network failure.
        # Exits 1 (fails the build) only when no data is available at all.

      - name: Build Docker image
        run: docker build -t prts-mcp:latest .

      - name: Smoke test Docker image
        run: |
          echo '{"jsonrpc":"2.0","method":"tools/list","id":1}' | \
          docker run -i --rm prts-mcp:latest | \
          python -c "
          import sys, json
          d = json.loads(sys.stdin.read())
          names = {t['name'] for t in d['result']['tools']}
          assert 'get_operator_archives' in names, f'Missing tool. Got: {names}'
          assert 'search_prts' in names, f'Missing tool. Got: {names}'
          print('Smoke test passed. Tools:', sorted(names))
          "
